<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VaultRadio">
<meta name="theme-color" content="#0a0008">
<title>VaultRadio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0008;--surf:#130112;--surf2:#1c0120;--surf3:#250128;
  --b1:#2a0830;--b2:#3d1045;
  --acc:#b400ff;--acc2:#8800cc;--acc3:#cc44ff;
  --grn:#00ff88;--red:#ff4466;--ylw:#ffcc00;--pink:#ff44cc;
  --txt:#f0e8f8;--txt2:#9977bb;--txt3:#553366;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.screen{display:none;flex-direction:column;height:100%;height:-webkit-fill-available}
.screen.on{display:flex}

/* bg glow */
.glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.glow::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(180,0,255,.13) 0%,transparent 70%);top:-150px;left:-100px;animation:g1 14s ease-in-out infinite alternate}
.glow::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(255,68,204,.09) 0%,transparent 70%);bottom:-80px;right:-60px;animation:g2 10s ease-in-out infinite alternate}
@keyframes g1{to{transform:translate(80px,50px)}}
@keyframes g2{to{transform:translate(-50px,-40px)}}

/* LOCK */
#sLock{align-items:center;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;padding-top:calc(var(--st)+20px);padding-bottom:calc(var(--sb)+20px)}
.card{background:var(--surf);border:1px solid var(--b2);border-radius:22px;padding:28px 22px;width:100%;max-width:400px;position:relative;z-index:1}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:26px;gap:6px}
.logo-icon{font-size:46px;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.logo-title{font-family:monospace;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--acc3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.logo-sub{font-size:10px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase}
.flabel{font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.fg{margin-bottom:15px}
.inp{width:100%;background:var(--surf2);border:1.5px solid var(--b2);border-radius:10px;padding:13px 14px;font-family:monospace;font-size:14px;color:var(--txt);outline:none;-webkit-appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--txt3)}
.role-row{display:flex;gap:10px;margin-bottom:18px}
.rbtn{flex:1;padding:14px 8px;border-radius:10px;border:1.5px solid var(--b2);background:var(--surf2);color:var(--txt2);font-family:monospace;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;transition:all .2s;text-align:center}
.rbtn .ri{font-size:20px;display:block;margin-bottom:3px}
.rbtn.sel{border-color:var(--acc);background:rgba(180,0,255,.15);color:var(--acc3)}
.pbtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:10px;font-family:monospace;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;transition:opacity .15s}
.pbtn:active{opacity:.8}
.pbtn.ghost{background:transparent;color:var(--txt2);border:1.5px solid var(--b2);margin-top:10px}
.pbtn.ghost:active{background:var(--surf2)}
.pbtn.grn{background:linear-gradient(135deg,#00cc66,#009944)}
.pbtn.red{background:linear-gradient(135deg,var(--red),#cc0033)}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px}
.code-big{width:100%;background:var(--surf2);border:1.5px solid var(--b2);border-radius:10px;padding:14px;font-family:monospace;font-size:26px;font-weight:700;color:var(--txt);outline:none;text-align:center;letter-spacing:8px;-webkit-appearance:none;transition:border-color .2s}
.code-big:focus{border-color:var(--acc)}
.code-big::placeholder{color:var(--txt3);font-size:14px;letter-spacing:2px}

/* WAIT */
#sWait{align-items:center;justify-content:center;padding:20px;padding-top:calc(var(--st)+20px);padding-bottom:calc(var(--sb)+20px)}
.wcard{background:var(--surf);border:1px solid var(--b2);border-radius:22px;padding:28px 22px;width:100%;max-width:400px;text-align:center;position:relative;z-index:1}
.big-code{font-size:58px;font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--acc3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:10px;margin:8px 0 4px}
.spinner{width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.share-row{display:flex;gap:8px;margin:14px 0}
.sbtn{flex:1;padding:12px;border-radius:10px;font-family:monospace;font-size:12px;font-weight:600;cursor:pointer;border:none;touch-action:manipulation}
.sbtn.pri{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.sbtn.sec{background:var(--surf2);color:var(--txt2);border:1.5px solid var(--b2)}

/* APP */
#sApp{overflow:hidden}
#topbar{background:var(--surf);border-bottom:1px solid var(--b1);padding:0 12px 8px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;padding-top:calc(var(--st)+4px);min-height:calc(50px + var(--st));position:relative;z-index:5}
.tb-logo{font-family:monospace;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--acc3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-pill{font-size:10px;font-family:monospace;padding:3px 8px;border-radius:20px;white-space:nowrap}
.tb-room{background:var(--surf2);border:1px solid var(--b2);color:var(--txt2)}
.tb-dj{background:rgba(180,0,255,.15);border:1px solid var(--acc);color:var(--acc3)}
.tb-lst{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);color:var(--grn)}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cdot.g{background:var(--grn)}.cdot.y{background:var(--ylw);animation:blk 1.5s infinite}.cdot.r{background:var(--red)}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.3}}
.tb-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.tb-users{font-size:10px;color:var(--txt2);font-family:monospace}

/* PLAYER */
#player{flex-shrink:0;background:#000;position:relative}
#ytHolder{width:100%;aspect-ratio:16/9;max-height:210px;background:#000;overflow:hidden;position:relative}
#ytHolder iframe,#ytHolder #ytDiv{position:absolute;top:-60px;left:0;width:100%;height:calc(100% + 120px)}
#nowBar{background:var(--surf);border-bottom:1px solid var(--b1);padding:10px 14px;flex-shrink:0}
.np-title{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.np-sub{font-size:10px;color:var(--txt3);font-family:monospace}
.prog-wrap{margin-top:7px;display:flex;align-items:center;gap:7px}
.prog-outer{flex:1;height:5px;background:var(--b2);border-radius:3px;cursor:pointer;position:relative;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc3));border-radius:3px;transition:width .8s linear;pointer-events:none}
.prog-t{font-size:9px;color:var(--txt3);font-family:monospace;white-space:nowrap;min-width:30px}
#ctrlBar{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--b1);flex-shrink:0}
.cbtn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--b2);background:var(--surf2);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;touch-action:manipulation;transition:all .15s;flex-shrink:0}
.cbtn:active{transform:scale(.88)}
.cbtn.big{width:50px;height:50px;font-size:21px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:var(--acc);color:#fff}
.cbtn.on{color:var(--acc3);border-color:var(--acc)}
.cbtn:disabled{opacity:.3;pointer-events:none}
.vol-row{display:flex;align-items:center;gap:5px;flex:1;max-width:110px}
.vol-icon{font-size:13px;color:var(--txt3)}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--b2);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc3);cursor:pointer}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--surf)}
.tab{flex:1;padding:10px 4px;font-family:monospace;font-size:10px;font-weight:600;border:none;background:transparent;color:var(--txt3);cursor:pointer;touch-action:manipulation;border-bottom:2px solid transparent;transition:all .15s;position:relative}
.tab.on{color:var(--acc3);border-bottom-color:var(--acc)}
.tab .badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:8px;padding:1px 5px;border-radius:8px;font-family:monospace}

/* PANELS */
.panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.panel::-webkit-scrollbar{display:none}

/* QUEUE */
.qi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--b1);cursor:default;position:relative;transition:background .15s}
.qi.now{background:rgba(180,0,255,.1)}
.qi.now::after{content:'▶';position:absolute;right:44px;font-size:9px;color:var(--acc3)}
.qi-thumb{width:52px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--b1)}
.qi-info{flex:1;min-width:0}
.qi-title{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.qi-meta{font-size:10px;color:var(--txt3);font-family:monospace}
.qi-del{width:32px;height:32px;border-radius:50%;background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:15px;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qi-del:active{color:var(--red)}
.empty{text-align:center;padding:32px 16px;color:var(--txt3);font-family:monospace;font-size:11px;line-height:2}

/* SUGGESTIONS */
.sug-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--b1)}
.sug-thumb{width:52px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--b1)}
.sug-info{flex:1;min-width:0}
.sug-title{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.sug-from{font-size:10px;color:var(--txt3);font-family:monospace}
.sug-acts{display:flex;gap:6px;flex-shrink:0}
.sug-acc{padding:6px 12px;border-radius:8px;border:none;background:linear-gradient(135deg,#00cc66,#009944);color:#fff;font-family:monospace;font-size:11px;cursor:pointer;touch-action:manipulation}
.sug-rej{padding:6px 10px;border-radius:8px;border:none;background:var(--surf2);color:var(--red);font-family:monospace;font-size:11px;cursor:pointer;touch-action:manipulation;border:1px solid var(--b2)}

/* ADD BAR */
#addBar{background:var(--surf);border-top:1px solid var(--b1);padding:8px 10px;padding-bottom:calc(8px + var(--sb));flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.add-lbl{font-size:10px;color:var(--txt3);font-family:monospace}
.add-row{display:flex;gap:8px}
.add-inp{flex:1;background:var(--surf2);border:1.5px solid var(--b2);border-radius:22px;padding:10px 14px;font-family:monospace;font-size:13px;color:var(--txt);outline:none;-webkit-appearance:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--acc)}
.add-inp::placeholder{color:var(--txt3)}
.add-go{width:44px;height:44px;min-width:44px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0}

/* CHAT */
#chatList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;display:flex;flex-direction:column;gap:2px;overscroll-behavior:contain}
#chatList::-webkit-scrollbar{display:none}
.mrow{display:flex;flex-direction:column;margin-bottom:2px}
.mrow.me{align-items:flex-end}.mrow.them{align-items:flex-start}.mrow.sys{align-items:center}
.mmeta{font-size:10px;color:var(--txt3);margin:0 6px 3px;display:flex;align-items:center;gap:5px}
.mname{color:var(--txt2);font-weight:500}
.bub{max-width:80%;padding:8px 12px;font-size:14px;line-height:1.5;word-break:break-word;border:1px solid transparent;animation:bi .18s ease}
.me .bub{background:rgba(180,0,255,.2);border-color:var(--acc2);border-radius:14px 14px 3px 14px;color:var(--txt)}
.them .bub{background:var(--surf2);border-color:var(--b2);border-radius:14px 14px 14px 3px;color:var(--txt)}
.sys .bub{background:transparent;border:none;font-size:10px;color:var(--txt3);font-family:monospace;padding:2px 6px;display:flex;align-items:center;gap:8px;width:100%}
.sys .bub::before,.sys .bub::after{content:'';flex:1;height:1px;background:var(--b1)}
#chatInput{background:var(--surf);border-top:1px solid var(--b1);padding:8px 10px;padding-bottom:calc(8px + var(--sb));display:flex;gap:8px;flex-shrink:0}
#chatInp{flex:1;background:var(--surf2);border:1.5px solid var(--b2);border-radius:22px;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;-webkit-appearance:none;transition:border-color .2s}
#chatInp:focus{border-color:var(--acc)}
#chatInp::placeholder{color:var(--txt3)}
.send-btn{width:42px;height:42px;min-width:42px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0}

/* LISTENERS */
.li-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b1)}
.li-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:monospace;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--pink))}
.li-name{font-size:13px;color:var(--txt);flex:1}
.li-role{font-size:10px;font-family:monospace;padding:2px 8px;border-radius:10px}
.li-role.dj{background:rgba(180,0,255,.2);color:var(--acc3)}
.li-role.lst{background:rgba(0,255,136,.1);color:var(--grn)}

/* TOAST */
.toast{position:fixed;bottom:calc(70px + var(--sb));left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--b2);padding:9px 18px;border-radius:22px;font-size:12px;font-family:monospace;color:var(--txt);z-index:999;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.hide{opacity:0}

@keyframes bi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="glow"></div>

<!-- LOCK -->
<div id="sLock" class="screen on">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📻</div>
      <div class="logo-title">VAULTRADIO</div>
      <div class="logo-sub">P2P · Synchronized · Free</div>
    </div>
    <div class="fg">
      <label class="flabel">Your Name</label>
      <input class="inp" id="iName" maxlength="20" placeholder="Display name..." autocorrect="off" autocapitalize="words">
    </div>
    <div class="fg">
      <label class="flabel">I want to...</label>
      <div class="role-row">
        <button class="rbtn sel" id="bDJ" onclick="setRole('dj')"><span class="ri">🎧</span>Be the DJ</button>
        <button class="rbtn" id="bLst" onclick="setRole('listener')"><span class="ri">🎵</span>Join Room</button>
      </div>
    </div>
    <div id="joinBox" style="display:none" class="fg">
      <label class="flabel">Room Code</label>
      <input class="code-big" id="iCode" maxlength="4" placeholder="····" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)">
    </div>
    <button class="pbtn" onclick="enter()">📻 Start</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- WAIT -->
<div id="sWait" class="screen">
  <div class="glow"></div>
  <div class="wcard">
    <div style="font-size:11px;color:var(--txt3);font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Room Code</div>
    <div class="big-code" id="bigCode">····</div>
    <div style="font-size:11px;color:var(--txt3);font-family:monospace;margin-bottom:14px">Share with your listeners</div>
    <div class="share-row">
      <button class="sbtn pri" onclick="copyCode()">📋 Copy Code</button>
      <button class="sbtn sec" onclick="shareCode()">📤 Share</button>
    </div>
    <div id="wStatus" style="font-size:11px;color:var(--txt2);font-family:monospace;margin:10px 0">
      <span class="spinner"></span>Waiting for listeners...
    </div>
    <button class="pbtn" onclick="goApp()" style="margin-top:8px">▶ Open DJ Console</button>
    <button class="pbtn ghost" onclick="go('sLock')">◀ Back</button>
  </div>
</div>

<!-- APP -->
<div id="sApp" class="screen">
  <div id="topbar">
    <span style="font-size:16px;flex-shrink:0">📻</span>
    <div class="tb-logo">VAULT<span style="color:var(--pink)">RADIO</span></div>
    <div class="tb-pill tb-room" id="tbRoom">#—</div>
    <div class="tb-pill" id="tbRole">—</div>
    <div class="tb-right">
      <div class="cdot y" id="cDot"></div>
      <span style="font-size:10px;color:var(--txt2);font-family:monospace" id="cLbl">—</span>
      <span class="tb-users" id="tbUsers">👥1</span>
    </div>
  </div>

  <!-- YOUTUBE PLAYER (hidden controls, overlay blocks ads) -->
  <div id="player">
    <div id="ytHolder">
      <div id="ytDiv"></div>
    </div>
    <div id="nowBar">
      <div class="np-title" id="npTitle">Nothing playing — add a YouTube link below</div>
      <div class="np-sub" id="npSub">Queue is empty</div>
      <div class="prog-wrap">
        <span class="prog-t" id="pCur">0:00</span>
        <div class="prog-outer" id="progBar" onclick="djSeek(event)">
          <div class="prog-inner" id="progInner" style="width:0%"></div>
        </div>
        <span class="prog-t" id="pTot">0:00</span>
      </div>
    </div>
    <div id="ctrlBar">
      <div class="vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volBar" min="0" max="100" value="80" oninput="setVol(this.value)">
        <span class="vol-icon">🔊</span>
      </div>
      <button class="cbtn" id="bPrev" onclick="djPrev()">⏮</button>
      <button class="cbtn big" id="bPlay" onclick="djToggle()">▶</button>
      <button class="cbtn" id="bNext" onclick="djNext()">⏭</button>
      <button class="cbtn" id="bShuf" onclick="djShuffle()" title="Shuffle">🔀</button>
      <button class="cbtn" id="bLoop" onclick="djLoop()" title="Loop">🔁</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" data-t="queue" onclick="switchTab('queue')">Queue</button>
    <button class="tab" data-t="sug" onclick="switchTab('sug')">Suggest<span class="badge" id="sugBadge" style="display:none">0</span></button>
    <button class="tab" data-t="chat" onclick="switchTab('chat')">Chat</button>
    <button class="tab" data-t="people" onclick="switchTab('people')">People</button>
  </div>

  <!-- QUEUE TAB -->
  <div id="tQueue" style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0">
    <div class="panel" id="qList"></div>
    <div id="addBar">
      <div class="add-lbl" id="addLbl">🎧 Add track to queue</div>
      <div class="add-row">
        <input class="add-inp" id="addInp" placeholder="YouTube URL or video ID..." onkeydown="if(event.key==='Enter')doAdd()">
        <button class="add-go" onclick="doAdd()">+</button>
      </div>
    </div>
  </div>

  <!-- SUGGESTIONS TAB -->
  <div id="tSug" style="display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0">
    <div class="panel" id="sugList">
      <div class="empty" id="sugEmpty">No suggestions yet<br>Listeners can suggest songs here</div>
    </div>
  </div>

  <!-- CHAT TAB -->
  <div id="tChat" style="display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0">
    <div id="chatList"></div>
    <div id="chatInput">
      <input id="chatInp" placeholder="Message..." onkeydown="if(event.key==='Enter')doChat()">
      <button class="send-btn" onclick="doChat()">➤</button>
    </div>
  </div>

  <!-- PEOPLE TAB -->
  <div id="tPeople" style="display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0">
    <div class="panel" id="peopleList"></div>
  </div>
</div>

<script>
// ═══════════════════ STATE ═══════════════════
let myName='', myRole='dj', myCode='';
let peer=null;
let conns=[];          // DJ: all open connections
let djConn=null;       // Listener: connection to DJ
let yt=null, ytOk=false;
let queue=[];          // [{id,title,thumb,addedBy}]
let suggestions=[];    // [{id,title,thumb,from,sid}]
let nowIdx=-1, playing=false, looping=false;
let listeners={};      // peerId -> {name}
let syncTick=null;
let activeTab='queue';
let sugCount=0;

// ═══════════════════ ROLE ═══════════════════
function setRole(r){
  myRole=r;
  document.getElementById('bDJ').classList.toggle('sel',r==='dj');
  document.getElementById('bLst').classList.toggle('sel',r==='listener');
  document.getElementById('joinBox').style.display=r==='listener'?'':'none';
}

// ═══════════════════ ENTER ═══════════════════
function enter(){
  const name=document.getElementById('iName').value.trim();
  const err=document.getElementById('err');
  if(!name){err.textContent='Enter your name.';return;}
  myName=name; err.textContent='';
  if(myRole==='listener'){
    const c=document.getElementById('iCode').value.trim();
    if(c.length!==4){err.textContent='Enter the 4-digit room code.';return;}
    myCode=c; joinAsListener(c);
  } else {
    startAsDJ();
  }
}

// ═══════════════════ DJ INIT ═══════════════════
function startAsDJ(){
  const code=String(Math.floor(1000+Math.random()*9000));
  myCode=code;
  go('sWait');
  document.getElementById('bigCode').textContent='····';

  peer=new Peer('vr-'+code+'-host',{host:'0.peerjs.com',port:443,path:'/',secure:true,debug:0});

  peer.on('open',()=>{
    document.getElementById('bigCode').textContent=code;
    document.getElementById('wStatus').innerHTML=`<span class="spinner"></span>Waiting on <strong style="color:var(--acc3)">${code}</strong>...`;
  });

  peer.on('connection',conn=>{
    conn.on('open',()=>{
      conns.push(conn);
      // Send full state to new joiner
      conn.send(J({type:'state',queue,nowIdx,playing,looping,suggestions}));
      setupDJConn(conn);
    });
  });

  peer.on('error',e=>{
    if(e.type==='unavailable-id'){peer.destroy();peer=null;startAsDJ();}
    else toast('PeerJS error: '+e.type);
  });

  loadYTApi();
}

function setupDJConn(conn){
  conn.on('data',raw=>{
    const m=P(raw); if(!m)return;

    if(m.type==='hello'){
      listeners[conn.peer]={name:m.name,conn};
      bcastAll({type:'user_join',name:m.name});
      sysChat('👤 '+m.name+' joined');
      renderPeople(); bcastCount();
    }
    if(m.type==='chat'){
      bcastExcept({type:'chat',name:m.name,text:m.text},conn);
      addChat(m.name,m.text,false);
    }
    if(m.type==='suggest'){
      // Add to suggestions queue for DJ to approve/reject
      const sug={...m.track,from:m.name,sid:m.sid};
      suggestions.push(sug);
      renderSuggestions();
      bcastAll({type:'sug_update',suggestions});
      sysChat('💡 '+m.name+' suggested: '+m.track.title);
      // Update badge
      if(activeTab!=='sug'){sugCount++;updateSugBadge();}
    }
    if(m.type==='ping')conn.send(J({type:'pong'}));
  });
  conn.on('close',()=>{
    conns=conns.filter(c=>c!==conn);
    const l=listeners[conn.peer];
    if(l){delete listeners[conn.peer];sysChat('👤 '+l.name+' left');renderPeople();bcastCount();}
  });
  conn.on('error',e=>console.error('conn err',e));
}

function bcastAll(msg){const r=J(msg);conns.forEach(c=>{if(c.open)c.send(r);});}
function bcastExcept(msg,exc){const r=J(msg);conns.forEach(c=>{if(c!==exc&&c.open)c.send(r);});}
function bcastCount(){
  const n=Object.keys(listeners).length+1;
  document.getElementById('tbUsers').textContent='👥'+n;
  bcastAll({type:'count',n});
}

function goApp(){go('sApp');setupApp();}

// ═══════════════════ LISTENER INIT ═══════════════════
function joinAsListener(code){
  go('sWait');
  document.getElementById('bigCode').textContent=code;
  document.getElementById('wStatus').innerHTML=`<span class="spinner"></span>Connecting to <strong style="color:var(--acc3)">${code}</strong>...`;
  // Hide DJ-only wait buttons
  document.querySelectorAll('#sWait .pbtn').forEach(b=>b.style.display='none');

  peer=new Peer('vr-'+code+'-L-'+Math.random().toString(36).slice(2,7),{host:'0.peerjs.com',port:443,path:'/',secure:true,debug:0});

  peer.on('open',()=>{
    djConn=peer.connect('vr-'+code+'-host',{reliable:true});
    djConn.on('open',()=>{
      djConn.send(J({type:'hello',name:myName}));
      setupListenerConn();
    });
    djConn.on('error',()=>toast('Could not connect — check the code'));
  });

  peer.on('error',e=>{
    if(e.type==='peer-unavailable')toast('Room not found — is the code correct?');
    else toast('Error: '+e.type);
  });

  loadYTApi();
}

function setupListenerConn(){
  djConn.on('data',raw=>{
    const m=P(raw); if(!m)return;

    if(m.type==='state'){
      queue=m.queue||[]; nowIdx=m.nowIdx; playing=m.playing; looping=m.looping;
      suggestions=m.suggestions||[];
      go('sApp'); setupApp();
      renderQueue(); renderSuggestions();
      if(nowIdx>=0&&queue[nowIdx])cueVideo(queue[nowIdx],playing);
      return;
    }
    if(m.type==='play'){nowIdx=m.idx;queue=m.queue;playing=true;renderQueue();cueVideo(queue[nowIdx],true);return;}
    if(m.type==='queue_update'){queue=m.queue;nowIdx=m.nowIdx;renderQueue();return;}
    if(m.type==='pause'){yt&&yt.pauseVideo();playing=false;updatePlayBtn();return;}
    if(m.type==='resume'){yt&&yt.playVideo();playing=true;updatePlayBtn();return;}
    if(m.type==='seek'){yt&&yt.seekTo(m.t,true);return;}
    if(m.type==='sync'){
      if(!yt)return;
      const st=m.t+(Date.now()-m.ts)/1000;
      const lt=yt.getCurrentTime()||0;
      if(Math.abs(lt-st)>1.8)yt.seekTo(st,true);
      if(m.playing&&yt.getPlayerState()!==1)yt.playVideo();
      if(!m.playing&&yt.getPlayerState()===1)yt.pauseVideo();
      return;
    }
    if(m.type==='loop'){looping=m.v;updateLoopBtn();return;}
    if(m.type==='sug_update'){suggestions=m.suggestions;renderSuggestions();return;}
    if(m.type==='sug_accepted'){
      sysChat('✅ DJ added: '+m.title);
      suggestions=suggestions.filter(s=>s.sid!==m.sid);
      renderSuggestions();
      return;
    }
    if(m.type==='sug_rejected'){
      sysChat('❌ DJ skipped: '+m.title);
      suggestions=suggestions.filter(s=>s.sid!==m.sid);
      renderSuggestions();
      return;
    }
    if(m.type==='chat'){addChat(m.name,m.text,false);return;}
    if(m.type==='user_join'){sysChat('👤 '+m.name+' joined');return;}
    if(m.type==='count'){document.getElementById('tbUsers').textContent='👥'+m.n;return;}
  });
  djConn.on('close',()=>{
    document.getElementById('cDot').className='cdot r';
    document.getElementById('cLbl').textContent='Disconnected';
    sysChat('⚠ DJ disconnected');
  });
}

// ═══════════════════ APP SETUP ═══════════════════
function setupApp(){
  const isDJ=myRole==='dj';
  document.getElementById('tbRoom').textContent='#'+myCode;
  const roleEl=document.getElementById('tbRole');
  roleEl.textContent=isDJ?'🎧 DJ':'🎵 Listener';
  roleEl.className='tb-pill '+(isDJ?'tb-dj':'tb-lst');
  document.getElementById('cDot').className='cdot g';
  document.getElementById('cLbl').textContent=isDJ?'Hosting':'Connected';

  if(!isDJ){
    ['bPrev','bPlay','bNext','bShuf','bLoop'].forEach(id=>document.getElementById(id).disabled=true);
    document.getElementById('progBar').style.cursor='default';
    document.getElementById('addLbl').textContent='💡 Suggest a track to the DJ';
    document.getElementById('addInp').placeholder='Paste YouTube URL to suggest...';
  }

  if(isDJ){
    syncTick=setInterval(()=>{
      if(yt&&playing)bcastAll({type:'sync',t:yt.getCurrentTime(),playing,ts:Date.now()});
    },4000);
    renderPeople(); bcastCount();
  }

  renderQueue(); renderSuggestions();
  sysChat('📻 VaultRadio · Room #'+myCode+(isDJ?' · You are the DJ':''));
}

// ═══════════════════ YOUTUBE ═══════════════════
function loadYTApi(){
  if(window.YT&&window.YT.Player){ytInit();return;}
  if(document.getElementById('ytScript'))return;
  const s=document.createElement('script');
  s.id='ytScript';s.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}
window.onYouTubeIframeAPIReady=function(){ytOk=true;ytInit();}

function ytInit(){
  yt=new YT.Player('ytDiv',{
    width:'100%',height:'100%',
    playerVars:{
      autoplay:0,
      controls:0,        // hide YT controls
      disablekb:1,
      fs:0,
      iv_load_policy:3,
      modestbranding:1,
      rel:0,
      showinfo:0,
      // These params reduce ads significantly on embedded players
      playsinline:1,
      origin:location.origin
    },
    events:{
      onReady:()=>{yt.setVolume(80);},
      onStateChange:e=>{
        if(e.data===YT.PlayerState.ENDED){
          if(looping)yt.playVideo();
          else if(myRole==='dj')djNext();
        }
        if(e.data===YT.PlayerState.PLAYING){playing=true;updatePlayBtn();}
        if(e.data===YT.PlayerState.PAUSED){playing=false;updatePlayBtn();}
      }
    }
  });
  setInterval(tickProgress,1000);
}

function cueVideo(track,autoplay){
  if(!yt)return;
  document.getElementById('npTitle').textContent=track.title;
  document.getElementById('npSub').textContent='♪ '+track.addedBy+' · youtu.be/'+track.id;
  if(autoplay)yt.loadVideoById(track.id);
  else yt.cueVideoById(track.id);
}

function tickProgress(){
  if(!yt)return;
  try{
    const c=yt.getCurrentTime()||0,d=yt.getDuration()||0;
    const p=d>0?Math.min(100,Math.round(c/d*100)):0;
    document.getElementById('progInner').style.width=p+'%';
    document.getElementById('pCur').textContent=ts(c);
    document.getElementById('pTot').textContent=ts(d);
  }catch{}
}
function ts(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}

// ═══════════════════ DJ CONTROLS ═══════════════════
function djToggle(){
  if(!yt||nowIdx<0)return;
  if(playing){yt.pauseVideo();bcastAll({type:'pause'});}
  else{yt.playVideo();bcastAll({type:'resume'});}
}
function djNext(){
  if(myRole!=='dj'||!queue.length)return;
  let next=nowIdx+1;
  if(next>=queue.length)next=looping?0:-1;
  if(next<0){playing=false;updatePlayBtn();return;}
  nowIdx=next;
  cueVideo(queue[nowIdx],true);
  bcastAll({type:'play',idx:nowIdx,queue});
  renderQueue();
}
function djPrev(){
  if(myRole!=='dj'||nowIdx<=0)return;
  nowIdx--;
  cueVideo(queue[nowIdx],true);
  bcastAll({type:'play',idx:nowIdx,queue});
  renderQueue();
}
function djSeek(e){
  if(myRole!=='dj'||!yt)return;
  const bar=document.getElementById('progBar');
  const r=bar.getBoundingClientRect();
  const t=(e.clientX-r.left)/r.width*yt.getDuration();
  yt.seekTo(t,true);
  bcastAll({type:'seek',t});
}
function djLoop(){
  if(myRole!=='dj')return;
  looping=!looping; updateLoopBtn();
  bcastAll({type:'loop',v:looping});
}
function djShuffle(){
  if(myRole!=='dj'||queue.length<2)return;
  // Fisher-Yates
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}
  nowIdx=0;
  cueVideo(queue[0],playing);
  bcastAll({type:'play',idx:0,queue});
  bcastAll({type:'queue_update',queue,nowIdx:0});
  renderQueue();
  toast('Queue shuffled!');
}
function setVol(v){if(yt)yt.setVolume(parseInt(v));}
function updatePlayBtn(){const b=document.getElementById('bPlay');if(b)b.textContent=playing?'⏸':'▶';}
function updateLoopBtn(){const b=document.getElementById('bLoop');if(b)b.classList.toggle('on',looping);}

// ═══════════════════ ADD / SUGGEST TRACK ═══════════════════
function extractId(s){
  s=s.trim();
  if(/^[a-zA-Z0-9_-]{11}$/.test(s))return s;
  const mm=s.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return mm?mm[1]:null;
}

async function fetchTitle(id){
  try{
    const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
    if(r.ok){const d=await r.json();return d.title||id;}
  }catch{}
  return id;
}

async function doAdd(){
  const inp=document.getElementById('addInp');
  const val=inp.value.trim(); if(!val)return;
  inp.value='';
  const id=extractId(val);
  if(!id){toast('⚠ Not a valid YouTube URL');return;}
  toast('🔍 Fetching info...');
  const title=await fetchTitle(id);
  const track={id,title,thumb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`,addedBy:myName};

  if(myRole==='dj'){
    djAddToQueue(track);
  } else {
    // Listener: send as suggestion
    const sid=Math.random().toString(36).slice(2,8);
    djConn.send(J({type:'suggest',name:myName,track,sid}));
    sysChat('💡 Suggested: '+title);
    toast('Suggestion sent to DJ!');
  }
}

function djAddToQueue(track, silent=false){
  queue.push(track);
  bcastAll({type:'queue_update',queue,nowIdx});
  renderQueue();
  if(!silent)toast('Added: '+track.title.slice(0,40));
  // Auto-play first track
  if(nowIdx===-1){
    nowIdx=0;
    cueVideo(queue[0],true);
    bcastAll({type:'play',idx:0,queue});
    renderQueue();
  }
}

function djRemoveFromQueue(i){
  if(myRole!=='dj')return;
  queue.splice(i,1);
  if(nowIdx>=i&&nowIdx>0)nowIdx--;
  bcastAll({type:'queue_update',queue,nowIdx});
  renderQueue();
}

function djPlayFromQueue(i){
  if(myRole!=='dj')return;
  nowIdx=i;
  cueVideo(queue[i],true);
  bcastAll({type:'play',idx:i,queue});
  renderQueue();
}

// ═══════════════════ SUGGESTIONS ═══════════════════
function djAcceptSuggestion(sid){
  const s=suggestions.find(x=>x.sid===sid);
  if(!s)return;
  suggestions=suggestions.filter(x=>x.sid!==sid);
  const track={id:s.id,title:s.title,thumb:s.thumb,addedBy:s.from};
  djAddToQueue(track,true);
  bcastAll({type:'sug_update',suggestions});
  bcastAll({type:'sug_accepted',sid,title:s.title});
  sysChat('✅ Added suggestion from '+s.from+': '+s.title);
  renderSuggestions();
  if(sugCount>0)sugCount=Math.max(0,sugCount-1);
  updateSugBadge();
}

function djRejectSuggestion(sid){
  const s=suggestions.find(x=>x.sid===sid);
  if(!s)return;
  suggestions=suggestions.filter(x=>x.sid!==sid);
  bcastAll({type:'sug_update',suggestions});
  bcastAll({type:'sug_rejected',sid,title:s.title});
  sysChat('❌ Skipped suggestion: '+s.title);
  renderSuggestions();
  if(sugCount>0)sugCount=Math.max(0,sugCount-1);
  updateSugBadge();
}

function updateSugBadge(){
  const b=document.getElementById('sugBadge');
  if(sugCount>0){b.textContent=sugCount;b.style.display='';}
  else b.style.display='none';
}

// ═══════════════════ RENDER ═══════════════════
function renderQueue(){
  const el=document.getElementById('qList');
  if(!queue.length){
    el.innerHTML='<div class="empty">Queue is empty<br>Add a YouTube link below 👇</div>';
    document.getElementById('npSub').textContent='Queue is empty';
    return;
  }
  el.innerHTML='';
  queue.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='qi'+(i===nowIdx?' now':'');
    const isDJ=myRole==='dj';
    d.innerHTML=`
      <img class="qi-thumb" src="${t.thumb}" loading="lazy" onerror="this.style.opacity=0">
      <div class="qi-info">
        <div class="qi-title">${esc(t.title)}</div>
        <div class="qi-meta">#${i+1} · ${esc(t.addedBy||'—')}</div>
      </div>
      ${isDJ?`<button class="qi-del" onclick="djRemoveFromQueue(${i})">✕</button>`:''}
    `;
    if(isDJ)d.addEventListener('dblclick',()=>djPlayFromQueue(i));
    el.appendChild(d);
  });
  // Scroll current into view
  setTimeout(()=>{
    const now=el.querySelector('.now');
    if(now)now.scrollIntoView({block:'nearest',behavior:'smooth'});
  },100);
}

function renderSuggestions(){
  const el=document.getElementById('sugList');
  const empty=document.getElementById('sugEmpty');
  const isDJ=myRole==='dj';
  if(!suggestions.length){
    el.innerHTML='';el.appendChild(empty);empty.style.display='';
    empty.textContent=isDJ?'No pending suggestions\nListeners can suggest tracks from the queue tab':'No suggestions yet\nUse the queue tab to suggest songs';
    return;
  }
  empty.style.display='none';
  el.innerHTML='';
  suggestions.forEach(s=>{
    const d=document.createElement('div');
    d.className='sug-item';
    d.innerHTML=`
      <img class="sug-thumb" src="${s.thumb}" loading="lazy" onerror="this.style.opacity=0">
      <div class="sug-info">
        <div class="sug-title">${esc(s.title)}</div>
        <div class="sug-from">suggested by ${esc(s.from)}</div>
      </div>
      ${isDJ?`<div class="sug-acts">
        <button class="sug-acc" onclick="djAcceptSuggestion('${s.sid}')">✓ Add</button>
        <button class="sug-rej" onclick="djRejectSuggestion('${s.sid}')">✕</button>
      </div>`:''}
    `;
    el.appendChild(d);
  });
}

function renderPeople(){
  const el=document.getElementById('peopleList');
  el.innerHTML='';
  const all=[{name:myName,role:'dj'},...Object.values(listeners).map(l=>({name:l.name,role:'listener'}))];
  all.forEach(u=>{
    const d=document.createElement('div');
    d.className='li-item';
    d.innerHTML=`<div class="li-av">${u.name[0].toUpperCase()}</div><div class="li-name">${esc(u.name)}</div><div class="li-role ${u.role==='dj'?'dj':'lst'}">${u.role==='dj'?'🎧 DJ':'🎵 Listener'}</div>`;
    el.appendChild(d);
  });
}

// ═══════════════════ CHAT ═══════════════════
function doChat(){
  const inp=document.getElementById('chatInp');
  const t=inp.value.trim(); if(!t)return;
  inp.value='';
  addChat(myName,t,true);
  const m={type:'chat',name:myName,text:t};
  if(myRole==='dj')bcastAll(m);
  else if(djConn&&djConn.open)djConn.send(J(m));
}
function addChat(name,text,mine){
  const el=document.getElementById('chatList');
  const row=document.createElement('div');
  row.className='mrow '+(mine?'me':'them');
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=`<div class="mmeta">${!mine?`<span class="mname">${esc(name)}</span>`:''}<span>${t}</span></div><div class="bub">${esc(text)}</div>`;
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function sysChat(txt){
  const el=document.getElementById('chatList');
  const row=document.createElement('div');
  row.className='mrow sys';
  row.innerHTML=`<div class="bub">${esc(txt)}</div>`;
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}

// ═══════════════════ TABS ═══════════════════
function switchTab(t){
  activeTab=t;
  ['queue','sug','chat','people'].forEach(x=>{
    document.getElementById('t'+x.charAt(0).toUpperCase()+x.slice(1)).style.display=x===t?'flex':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  if(t==='sug'){sugCount=0;updateSugBadge();}
}

// ═══════════════════ CODE SHARE ═══════════════════
function copyCode(){
  const c=document.getElementById('bigCode').textContent;
  if(c==='····'){toast('Code generating...');return;}
  const msg=`Join my VaultRadio room!\nCode: ${c}\n${location.href}`;
  navigator.clipboard.writeText(msg).then(()=>toast('Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=msg;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('Copied!');
  });
}
function shareCode(){
  const c=document.getElementById('bigCode').textContent;
  if(navigator.share)navigator.share({title:'VaultRadio',text:`Join! Code: ${c}`,url:location.href}).catch(()=>copyCode());
  else copyCode();
}

// ═══════════════════ HELPERS ═══════════════════
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function J(o){return JSON.stringify(o);}
function P(r){try{return JSON.parse(r);}catch{return null;}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastT=null;
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);clearTimeout(toastT);
  toastT=setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),400);},2800);
}
function fixVH(){const h=window.visualViewport?window.visualViewport.height:window.innerHeight;document.body.style.height=h+'px';}
if(window.visualViewport){window.visualViewport.addEventListener('resize',fixVH);window.visualViewport.addEventListener('scroll',fixVH);}
window.addEventListener('resize',fixVH);fixVH();

document.getElementById('iCode').addEventListener('keydown',e=>{if(e.key==='Enter')enter();});
